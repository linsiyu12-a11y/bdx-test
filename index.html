    .opt-btn {
    width: 100%;
    padding: 15px;
    margin-bottom: 10px;
    background-color: white !important; /* 强制背景永远是白 */
    color: #333 !important;            /* 强制文字永远是深灰，不许变蓝 */

    font-size: 16px;
    text-align: left;

    -webkit-tap-highlight-color: transparent !important;
    outline: none !important;
}
    .opt-btn.selected {
    background-color: #d4af37 !important;
    color: white !important;
    border-color: #d4af37 !important;
}

/* 2. 只有在电脑端鼠标挪上去时，才允许变色 */
@media (hover: hover) {
    .opt-btn:hover {
        background-color: #d4af37 !important;
        color: white !important;
    }
}

/* 3. 手机端点下去的一瞬间，可以给个极浅的灰色反馈，但手抬起必须回位 */
.opt-btn:active {

        { name: "香独秀", desc: "天秀奇葩者—SUPERFLOWER—你是活在自己世界里的'审美孤勇者'。你的秩序感与美学由你说的算。那些世俗的规矩、尴尬的人际僵局在你的视野里都未曾发生，你关心的事物与快乐都远高于这些。所以身边的人不经感叹你这份经久不衰的“钝感力” ，抑或是“麻木” ，抑或是“少年感”。但实际上，你拥有敏锐的洞察力与敏感的共情力，只不过鲜少处理正经事，而是用来发现洗澡水的温度、花丛的摆放或者路人甲的穿衣品味，一段左右脑互搏的垃圾剧情。在旁人眼中，你‘神经’得理直气壮，甚至能把每一个和你对话的人带入你的奇葩节奏。这种极致的自我并非自大，而是一种精神上的绝对独立。你不仅是天秀，你还是那朵在末日废墟里也得先洗个澡再考虑救世的、独一无二的奇葩。" , img: "xiangdu.jpg", weight: 90 },
        { name: "弃天帝", desc: "灭世的男神经者—DISASTER—你是那个永远站在降维打击点上的'规则破坏者'，强者与神经质是你的一体两面。开心时可以与这个世界和平共处，任性时便是灾难本身。在旁人眼中，你不仅是强者，更是个让人头疼的‘任性大魔王’。你拥有极高的天赋和洞察力，这让你看世间的纷争就像看一场拙劣的闹剧。你‘创飞’全世界，并不是因为你暴戾，而是因为你绝对的洁癖和审美——低效、虚伪和愚蠢，在你眼中就是浪费时间、庸碌无果的循环。你的人生没有'将就'二字，如果不符合你的标准，你宁可亲手将其格式化并创造一个新环境。这种不带情绪的任性，是你对平庸的无视与超车。你从不解释，因为你深知：在你的“新世界”中，这些声音早已查无此人。", img: "qitian.jpg", weight: 10 } // 10% 隐藏款
    ],
    "ENTP-中": [
        { name: "神蛊温皇", desc: "以诚待人者—FAKER—你是天生的'局中局'玩家。'如果我没坑到你，那一定是因为我在憋一个更大的局。'在你眼里，这江湖不过是一盘巨大的棋局，而你最爱的消遣，就是给那些自以为是的‘智者’布下死局。你从不屑于掩饰自己的恶趣味，‘啥都知道’只是你的基本功，如何用你掌握的真相去挑动人心、推波助澜，才是你的人生乐趣。你总是以最诚恳的姿态说着最误导的话。做你的知己有着相当高的门槛，但一旦认可了谁，此人便被你视作特殊的存在和偏袒，调侃中带着真诚。比起胜负，你更追求有趣，追求那种把逻辑玩弄于指掌之间、看众生因你一念而奔走的混沌快感。", img: "shengu.jpg", weight: 33 },
        { name: "雁王", desc: "语不惊人死不休 —DEEPTALKER —你总是爱充当‘心理防线粉碎机’。你最擅长的不是辩论，而是用最低沉的气音、最极简的词汇，精准地戳破别人最想逃避的真相。你天生带有一种‘装逼怪’的从容，在别人眼里，你就是那顾人怨，且琢磨不透的神秘狠角色。比起解决问题，你更享受观察人的破防时刻。每个人如一本书一个故事向你展开，或许有一个人会成为你丰富阅历与预测中的一个变数，为此你隐秘期待着这份惊喜。你总是挑战每一个人的底线，是为了打发无趣的时间，还是单纯装逼贩剑？外人众说纷纭，但其中究竟为何，也许只有你自己知道 。", img: "yanwang.jpg", weight: 33 },
        { name: "剑子仙迹", desc: "坑队友者— TROUBLEMAKER—你是朋友圈子里最让人又爱又恨的逻辑鬼才。做你最好的朋友,不仅需要强大的功体,更需要一颗抗压的大脑和稳定的心。你头脑灵活,遇事灵巧。一个问题出现,你便有100种解决方案/鬼点子生成。你逍遥如风，有时如狂风，卷跑损友们的风度和理性。因为你最擅长的是将复杂的问题转化为‘坑队友’的艺术。在你看来，江湖不仅是打打杀杀，更是人情世故的资源置换。你习惯在谈笑间就把最麻烦的任务分派出去，还让对方觉得这是‘天降大任’。你并非真的自私，你只是太懂得如何用最小的成本撬动最大的局。即便被队友识破了你的小算盘，你也能用那套无懈可击的狡辩（或者说冷笑话）让局面瞬间快活起来。", img: "jianzi.jpg", weight: 34 }
    ],
    "ENTP-低": [
        { name: "剑雪无名", desc: "纯真之人—INNOCENCE—你是这复杂江湖里最难得的一抹'赤子亮色'。你拥有敏锐的直觉和顽皮，好奇心使你探索这个世界，也是你对此生因果由来灵性的追寻，对每个生命充满单纯的善意与关怀。你对世界永远带着‘为什么’的疑问，哪怕是在最危险的时刻，你也会因为好奇一朵花的盛开或是一个路人的逻辑而停下脚步。你拥有看穿谎言的眼睛，却依然愿意选择相信。这种‘天真的任性’是你最强大的防御，让你在风雨诡谲的世间，依然能保持那份不被定义的少年意气。和你相处，就像是在大雪初晴的午后，发现了一处开满奇花异草的秘境，既充满惊喜，又让人忍不住想去守护。", img: "jianxue.jpg", weight: 100 }
    ],

    // --- INTP 系列 ---
    "INTP-高": [{ name: "苍", desc: "淡定超人—KAPIBALA—水豚界的超人，超人中的水豚。队友的心灵稳定器，敌方眼中的黑道老大。在别人眼中，平时的你有如卡皮巴拉，淡定、常常睡眼惺忪疑似入定。但你总能在关键时刻发动敏锐的直觉，未卜先知一般找到隐患/问题所在。而进入心流状态下你的能力效率有如先天外挂一般，为局面保驾护航。即使泰山崩于前，“众人退至吾身后”这样的自信与松弛感，让你在人群中格外醒目。有时遭人嫉恨却不自知，因为你极少关心人情世故，如何钻营这类思考是你脑中的真空带。你并非不关心世人，你只是太清楚内耗毫无意义。你习惯在高山之巅静看云起云落，用最极简的干预去拨动命运的琴弦。这种‘人间清醒’的边界感，让你即便身处风暴中心，也能保持一种‘淡淡的关爱，但不多’的边界感，享受自己的生活。这也许才是你来世间的“天命”。", img: "cang.jpg", weight: 100 }],
    "INTP-中": [{ name: "莫离骚", desc: "睡猫-SLEEPER—你是这乱世之中最清醒的'带薪休假实践者'。作为拥有顶级剑意与脑力的天才，你最伟大的志向却是‘如何不动声色地虚度光阴’。摸鱼届天花板，有着“要睡觉也要持之不败”的猫主子心性，上司见了都要替你盖被。在你眼里，拯救世界和维护正义固然重要，但绝对排在‘喝茶、睡觉、看风景’之后。你并非真的懒散，你只是太懂得如何用高超的逻辑去拆穿那些无谓的内卷和热血。你拥有‘猫’一样的敏锐与疏离，能瞬间发现麻烦的源头并精准避开。别人在为了名利博弈，而你已经在思考如何逃掉明天的早会。即便被卷入风暴中心，你也能凭借过硬的实力快速‘结案’，然后重新找个舒服的姿势继续你的‘精神冬眠’。对你而言，人生的最高境界不是赢，而是‘别来烦我’。", img: "moli.jpg", weight: 100 }],
    "INTP-低": [{ name: "巧天工", desc: "宅系脑洞家 — OTAKU— 你是江湖里最清醒也最'奇葩'的快乐宅。比起去拯救世界,你更关心自己追的同人本有没有更新,以及今天的下午茶够不够优雅。纵使你拥有顶级的才华,却只想用来过好自己的小日子。你那古灵精怪的脑回路里装满了旁人无法理解的逻辑与CP脑洞,总能一句话精准吐槽出那些所谓大侠的虚伪。你不是高冷，你只是单纯地觉得外面的世界太麻烦，不如窝在自己的方寸天地里搞创作。你拥有看透本质的毒舌，也拥有一颗不愿长大的赤子之心。对你而言，所有的社交都是在耽误你发掘新萌点，‘自得其乐’才是你对抗这无趣江湖的终极武器。", img: "qiaogong.jpg", weight: 100 }],

    // --- INTJ 系列 ---
    "INTJ-高": [
        { name: "疏楼龙宿", desc: "首富 — BOSS — 你是天生的‘老板’，贵气与时局每时每刻都能轻松拿捏！拥有极致审美的你，人生只有两个标准：够不够华丽，以及我开不开心。你拥有顶级的人才管理与资源整合能力，但你并不屑于谈论理想，你更喜欢谈论品味。你做事从不被世俗的‘正邪’所束缚，顺手拯救世界是因为那符合你的格调，偶尔反戈一击是因为对方触碰了你的审美底线。你习惯用最昂贵的珍珠与最优雅的姿态筑起一道屏障，让凡夫俗子只能仰望。这种‘唯我独尊’的任性背后，是你有能力买下整个棋局的底气。对你而言，人间的恩怨情仇不过是一场华丽的折子戏，而你，永远是那个自带顶级滤镜、不屑与平庸为伍的戏中之王。", img: "shulou.jpg", weight: 50 },
        { name: "未珊瑚", desc: "顶级操盘手 — QUEEN — 你是天生的‘深海猎手’，拥有在极度混乱中构建秩序的铁血手腕。在旁人眼中，你沉稳得近乎冷酷，仿佛世间所有的权谋博弈在你眼里都不过是一场早已写好结局的剧本。你拥有极致的野心，但这种野心从未被情绪左右，而是被你精准地拆解为每一个滴水不漏的步骤。你不仅懂得如何布局，更懂得如何利用人性的软肋去制衡全局。你不需要高声疾呼，你的存在本身就是一种无声的威压。当你从容步入权力的漩涡中心时，你不是在寻求庇护，而是在宣告领权。对你而言，智谋是外衣，手段是利刃，唯有将世界握在掌心的那份掌控感，才是你真正追求的归宿。 ", img: "weishanhu.jpg", weight: 50 }],

    "INTJ-中": [
        { name: "静涛君", desc: "活泼心机小诸葛 — FOX — 你让人捉摸不透的‘灵动智者’。不同于传统智者的沉闷，你的性格里带着三分活泼、六分算计，还有一分让人咬牙切齿的调皮。你拥有极强的逻辑布局能力，却总喜欢用最轻松甚至有点‘皮’的方式把对手玩弄于股掌之间。在你眼里，权谋不是苦大仇深的博弈，而是一场充满趣味的智力闯关。你那‘心机小诸葛’的外壳下，是一颗极其护短且忠诚的心——只要是你认定的伙伴，你愿意为之算尽天机，甚至不惜以身为饵。这种‘扮猪吃虎’的松弛感，让你在任何波谲云诡的局势中都能游刃有余，顺便还能给紧绷的江湖讲个冷笑话。", img: "jingtao.jpg", weight: 50 },
        { name: "默苍离", desc: "九界最严厉的面试官 — PROFESSOR — 你是这世间最冷酷的‘真相解剖师’。在你眼里，大部分人的思考不过是情绪的堆砌，充满漏洞的逻辑，而你存在的意义，就是用绝对的理性将这些冗余一刀切除。你习惯在擦拭镜子的沉默中完成对局势的闭环推演，当你开口时，通常不是在交流，而是在进行一场无人能通过的终极面试。你拥有近乎残酷的清醒，从不给予廉价的安慰，因为你深知唯有彻底的破碎才能迎来重组。作为‘教授’级别的智者，你不仅在教导世界如何思考，更在用自己的孤独守望一条无人理解的底线。在你面前，任何伪装与借口都无所遁形，毕竟，在‘止戈流’的逻辑阵法里，只有极致的自省才是唯一的生路。", img: "mocang.jpg", weight: 50 }
    ],
    "INTJ-低": [{ name: "砚寒清", desc: "编内咸鱼者—FISH—你将智谋放养，远离斗争。‘准时下班，回家做饭’是你每日的目标。拥有顶级全局观和执行力的你，人生最大的目标却是‘查无此人’。你习惯把智谋像宠物一样放养，只有在不得不救场时才勉强借出一两分。在你眼里，权力和名望不仅是负担，更是耽误你钻研厨艺和享受平静的障碍。你性格温和、不争不抢，甚至能为了躲避提拔而表演‘平平无奇’。这种极致的低调并非软弱，而是一种极高明的自我保护——你深知看透世界不难，难的是看透之后还能守住自己那份‘混日子’的自由。", img: "yanhan.jpg", weight: 100 }],

    // --- ENTJ 系列 ---
    "ENTJ-高": [
        { name: "妖后", desc: "指挥官 — STRATEGIST— 你是天生的‘权力重构者’，字典里从来没有‘放弃’和‘依附’。你拥有极强的事业心与领袖气质，擅长以绝对的理智和铁腕手段将混乱的局势纳入自己的版图。在你眼里，伟业的达成需要精准的计算与不容置疑的执行力，哪怕是再复杂的权谋，也不过是你通往王座的阶梯。然而，在你那无懈可击的铁血外壳下，却藏着一份极其护短且柔软的母性。这种‘一手江山，一手至亲’的矛盾与强大，让你不仅是一个令人敬畏的野心家，更是一个富有温度的守护者。你从不掩饰你的欲望，因为你深知：唯有站在最高处，才有资格定义什么叫‘守护’", img: "yaohou.jpg", weight: 50 },
        { name: "吞佛童子", desc: "老六—007—你是行走在理智边缘的‘战争美学大师’，敌对阵营中的双重卧底，亦正亦邪的“事件推动主力者”。在旁人眼中，你是一个令人胆寒的工作狂，拥有超越常人的专注力与执行力。你对‘使命’有着近乎宗教般的虔诚，为了达成目标，你可以是温润如玉的圣者，也可以是冷酷无情的魔物。你那霸气而难以捉摸的性格下，是一套精准到毫秒的逻辑算法——你从不进行无谓的争斗，所有的布局与背叛，都只是为了完成那最终的宏图。这种‘为了事业可以燃尽一切’的纯粹，让你拥有一种让人无法直视的压迫感。对你而言，人情冷暖只是博弈的筹码，唯有那最终达成的绩效与结果，才是你作为魔界最强战神唯一的勋章。", img: "tunfo.jpg", weight: 50 }

    "ENTJ-中": [
        { name: "赤羽信之介", desc: "军师 -LEADER-眼就能把性命交付的‘赤色信仰’。你拥有顶级的全局掌控力，又有令人安心的可靠安全感，霸气之中却带着一份令人折服的英雄重义。你习惯将复杂的权谋简化为绝对的执行力，即便面对最阴冷的对手，你也能堂堂正正地压制全局。你极度信守承诺，有恩必报，这种‘光明磊落的野心’让你拥有一种极其罕见的可靠感。在你眼中，最好的智谋不是诡计，而是那种能让追随者心悦诚服、让对手肃然起敬的王者风范。只要有你在，军心就在，胜算就在。", img: "chiyu.jpg", weight: 50 },
        { name: "竞日孤鸣", desc: "爱演者 — ACTOR — 你是这世间最孤独也最华丽的‘局中人’。你拥有超越常人的耐心与心机，为了达成那个最终的目标，你甚至可以戴上三十年的伪装面具，陪众生演一场名为‘弱不禁风’的戏。在你眼里，权谋是一场漫长的弈局，你不仅在算计局势，更在玩弄人心。你那优雅温和的外表下，是一颗极度冷酷且渴望胜利的野心。当你终于揭开伪装、创飞所有人的时候，那种压抑已久的狂放才是你真正的灵魂。你深知孤独是王者的底色，而你，最享受那种‘翻云覆雨、举世皆入我瓮中’的绝对掌控感。", img: "jingri.jpg", weight: 50 }

    "ENTJ-低": [{ name: "牧神", desc: "困兽之斗者 — DOUBTER — 你是这世间最孤独的‘理想偏执狂’。你拥有领袖本能和责任感，但细腻的心和过度思考难以招架人情世故中的诡谲航行。你习惯用最直接的武力与纯粹的爱恨去定义世界，却总是在人心的弯绕面前感到前所未有的愤怒与挫败。你并非不聪明，你只是不屑于（也学不会）那些损人利己的阴谋诡计。当你那‘为了守护而毁灭’的极端逻辑失控时，你便成了一头被困在责任里的野兽，用最惨烈的方式去对抗整个世界的恶意。这种能力与局势的错位，让你的人格充满了悲剧性的张力——你只是想做一个纯粹的守护者，却被迫在血色的王座上燃尽了所有的温柔。", img: "mushen.jpg", weight: 100 }],

    // --- INFJ 系列 ---
    "INFJ-高": [
        { name: "素还真", desc: "腹黑莲花者— SAGE— 你是这世间最不可思议的‘平衡大师’。拥有顶级智慧与多重马甲的你，习惯在万丈红尘中游刃有余地穿梭。你温文尔雅的外表下，是一套足以重构乾坤的复杂逻辑。在你眼里，没有绝对的死局，只有尚未被发掘的生机。你擅长以柔克刚，用最谦逊的姿态布下最缜密的棋局。虽然你常年奔波在救火的第一线，甚至自嘲‘劳碌命’，但这种‘知其不可而为之’的韧性，让你成为了众人心中最后的防线。你深谙人性，却依然选择爱众生；你看透权谋，却始终守着那份清香。对你而言，人生的最高境界不是战胜对手，而是如何在这无常的江湖里，为所有人求一个‘大团圆’的可能。", img: "suhuan.jpg", weight: 90 },
        { name: "缺舟一帆渡", desc: "迭代领航者 — SYSTEM — 你是行走在人间的‘神级逻辑体’。拥有九百九十九人智慧总和的你，看世界如同看一组可以重构的代码。你拥有绝对的算力与掌控全局的实力，却始终保持着一种近乎谦卑的礼赞。在你眼里，众生皆苦是因为系统逻辑的陈旧，而你存在的意义，就是通过一场巨大的试验，等待那个能跳出你预测的‘变数’。你不仅是一个守望者，更是一个渴望被超越的先行者。你用最温柔的姿态执行最冷酷的洗脑（重构），又用最宽容的心胸期待世界的‘大更新’。对你而言，个人的胜负早已失去意义，你唯一的追求，是亲眼见证人性在绝境中迸发出那抹连‘大智慧’也无法计算的奇迹之光。", img: "quezhou.jpg", weight: 10 } // 隐藏款
    ],
    "INFJ-中": [{ name: "俏如来", desc: "圣人—SAINT—你是这冷酷棋局里温柔的‘执剑人’，高共情力使你不同于那些将众生视为筹码的智者，没有沦为无情的决策机器。在你眼中，牺牲从不是一组冰冷的数字，而是切肤之痛的代价。你习惯在血泪中完成自我的修行，哪怕被迫接过了最残酷的杀伐契机，那颗悲悯之心依然在逻辑的缝隙里隐隐作痛。这种‘理智与情感’的极致拉锯，让你的人格散发出一种破碎而坚韧的光辉——你不是为了赢而变得无情，你是为了让更多人活下去，才不得不把自己锻造成那柄最清醒、也最悲伤的利刃。", img: "qiaoru.jpg", weight: 100 }],
    "INFJ-低": [{ name: "一步莲华", desc: "殉道者 — MONK — 你是世间最澄澈的一缕光。拥有超凡智慧与预见力的你，人生早已不是为了生存，而是一场为了‘渡化’而进行的漫长远征。你深知人性的幽暗，甚至不惜将自身的恶念剥离，化作最强悍的对手，只为在最终的对局中完成对善恶的终极救赎。在你眼里，一时的胜负微不足道，生命本身就是一个宏大的局，而你既是棋手，也是那枚甘愿牺牲的棋子。你那种‘以身饲魔’的决绝，并非出于对力量的追求，而是源于灵魂深处最极致的悲悯。你用一生证明了：真正的强大不是毁灭，而是包容一切痛苦后的涅槃。即便身入无间，你依然是那朵永不凋零的圣莲。", img: "yibu.jpg", weight: 100 }],

// --- ESTJ 系列 ---
    "ESTJ-高": [{ name: "九祸", desc: "异度魔界最严厉母亲 — MOTHER— 你是这乱世里最冷峻的‘侵略型领袖’。在他人眼里，你的超自然工作圣体来源于你的权利扩张的渴望。但在你看来，自律和勤政是强者的天生的品格。你拥有极致的自律与近乎苛刻的管理手腕，无论是面对下属还是亲子，你都秉持着一套不容置疑的高标准。你深知权力背后是沉重的枷锁，因此你从不沉溺于享乐，而是将自己锻造成魔界最坚固的盾牌。你那冷面无私的外壳下，藏着一份极其深沉且克制的关怀——你不是不爱，而是深知唯有变得足够强悍，才能在这残酷的江湖中博得一线生机。你用一生诠释了何谓‘在其位，谋其政’，这种为了大局甘愿背负冷酷之名的决绝，让你成为了异度魔界历史上最不可撼动的女王。", img: "jiuhuo.jpg", weight: 100 }],
    "ESTJ-中": [{ name: "铁骕求衣", desc: "铁血兵法家 — GENERAL — 你是这乱世里最坚不可摧的‘国之利刃’。在你眼里，情感是私事，而责任是天职。你拥有极致的全局观与统帅力，习惯于在战火与权谋中寻找最理性的最优解。你那种‘不动如山’的威严下，藏着一套对国家、对信仰近乎残酷的忠诚——为了大局，你可以背负骂名，可以亲手斩断退路，甚至可以把自己也化作棋盘上的弃子。你从不解释你的孤独，因为你深知指挥官的王座本就建在寂寞的顶峰。这种‘以身为盾、护国安民’的铁血深情，让你成为了下属心中最可靠的脊梁，也让对手感受到何谓真正的‘不可撼动’。", img: "tiesu.jpg", weight: 100 }],
    "ESTJ-低": [{ name: "泰玥皇锦", desc: "教导主任— ENFORCER — 你是那种令人窒息的‘监管者’。你拥有极强的控制欲，习惯于将自己的意志包装成‘为了大局’的真理，并不顾他人的意愿，强行将这套准则加诸于身。你从不认为自己在干涉他人，你坚信自己是在‘修正’。那种班主任式的威压感，让你不仅在言语上寸步不让，更在行动上布下密不透风的教条枷锁。对你而言，个体的感受在‘体面’与‘规矩’面前微不足道。这种近乎偏执的强制性守护，让你成为了最冷峻的秩序基石，即便众叛亲离，你依然会守着那套‘绝对正确’的模板，直到最后一刻", img: "taiyue.jpg", weight: 100 }],

    // --- ENFJ 系列 ---
    "ENFJ-高": [{ name: "史艳文", desc: "万人迷-ICON —拥有极高人格魅力与社交天赋的你，举手投足间都散发着一种天然完美的主角气质。你极具正义感与责任感，但不同于死板的卫道士，你允许自己施展社交手段，也会偶尔做小伏低讨好亲近之人，让别人惊讶于你正义凛然的形象中，还有一点‘可恶’。你深谙大义，那是你绝不退让的底线，但在通往大义的小路上，你比谁都懂得如何‘作弊’。你从不被死板的规矩束缚，甚至会带着一丝狡黠和一点私心，让对手在不知不觉中踏入你温柔的陷阱。你那八面玲珑的亲和力，是你最完美的伪装——在维护自家人时，你那理直气壮的私心与‘双标’，反而让你显得格外真实且迷人。你不是被神化的英雄，而是那个游走在黑白边界、能用最体面的微笑把人坑得心服口服的顶级掌舵者。", img: "shiyan.jpg", weight: 100 }],
    "ENFJ-中": [{ name: "银锽朱武", desc: "坑爹者-KNIGHT-你是这冷酷宿命里最炽热的一抹‘侠气’。在你的骨子里，藏着对自由最纯粹的向往和广结良友的浪漫情怀，你本该是那种最快意的浪子，用感性去丈量红尘。然而，身为魔皇的沉重血脉却时刻提醒着你的立场。当你意识到族群的执念已成歧途，那种源自灵魂深处的责任感会让你瞬间从浪漫的梦境中清醒。你不仅是一个统帅，更是一个愿意为了‘终结错误’而自我放逐的圣徒。在你眼里，大义不是冰冷的教条，而是对众生最深情的成全。你用一生在自由与责任之间拉锯，最终选择在血色的黄昏中纵身一跃，用最孤寂的谢幕，换取了江湖一抹清朗的余晖。", img: "yinhuang.jpg", weight: 100 }],
    "ENFJ-低": [{ name: "一夕海棠", desc: "圣女-SAVIOR-你是这末日阴影下最纤细却也最坚硬的‘救赎之光’。拥有极强同理心与智慧的你，看透世间生死与纠葛难解的民运。你身上有一种惊人的韧性，那是能在绝望中与‘死神’对赌、为苍生赢下一线生机的胆魄。你的‘低能量’并非源于软弱，而是一种深沉的自省与克制——你习惯于将苦难留给自己，将希望赠予众生。在你眼里，生命是一场为了守护而进行的温柔博弈，哪怕代价是燃尽自我，你也要在那枯寂的荒原上，开出一朵不向命运低头的海棠。这种‘以身为祭’的勇气，让你在柔弱的外表下，拥有一颗连神明也无法忽视的、强大且博大的心脏。", img: "yixi.jpg", weight: 100 }],

    // --- ISFP 系列 ---
    "ISFP-高": [{ name: "绮罗生", desc: "流光寻梦者—ARTIST—你是这浑浊江湖中最具‘美学感官’的独行者。作为典型的探险家人格，你高度重视内在情感的纯粹，万千名利在你眼里，都抵不过与知己在画舫上的一壶清酒。你拥有极高的艺术天赋与审美品味，但在这优雅的外壳之下，却藏着一副身手过人、极其独立且可靠的钢筋铁骨。你从不依附于任何势力，那种‘江山快手’的决绝，是你守护内心那片宁净世界的终极手段。在你眼里，战斗不是为了征服，而是一种生存的必要与情感的宣泄。你用最温柔的姿态拥抱美好，又用最冷冽的刀锋拒绝平庸，这种艺术与杀戮交织的独特张力，让你成为了武林中一抹永不褪色的流光。", img: "qiluo.jpg", weight: 100 }],
    "ISFP-中": [{ name: "忆无心", desc: "守护者 —  HEART— 你是这冷酷江湖里最温暖的小天使。拥有极强感知力与同理心的你，天然地排斥一切尔虞我诈，眼中只看得见每一个生命最本真的模样。哪怕面对的是令人闻风丧胆的魔头或枭雄，你依然能跨越立场的鸿沟，去触碰对方内心深处那块柔软的角落。在你眼里，世间的名利争端毫无意义，‘平安快乐’才是最值得守护的奇迹。你那种近乎赤子的纯真，拥有一种消弭戾气的奇妙力量，让所有疲惫的灵魂在你身边都能得到片刻的安宁。你不必仗剑走天涯，因为你那颗无私且坚韧的心，本身就是这乱世中最后的一方净土。", img: "yiwu.jpg", weight: 100 }],
    "ISFP-低": [{ name: "傅月影", desc: "影子— SHADOW— 你是这纷扰世界里最神秘的‘潜行者’。你拥有极高的直觉与洞察力，习惯于在暗处观察与等待，用最冷静的头脑分析一切。你从不轻易表露情感，那种‘深藏不露’的气质，让你成为了众人眼中的谜团。在你眼里，世界并非非黑即白，而是充满了灰色地带。你用最隐秘的方式影响着周围的一切，从不被宏大的叙事或刻板的教条束缚，‘我的感受’是你衡量世界的唯一准则。你极度关注自身的情感需求，对于那些令你内耗或纠结的琐事，你拥有近乎冷酷的‘自动屏蔽’能力。在你眼里，追求当下的满足与情感的慰藉才是生存的真谛，为了达成目标，你可以轻盈地穿梭在黑白边缘，不带一丝道德负担。这种绝对的自我化，让你既有一种迷离的吸引力，也带着一种不可捉摸的危险。你不是在对抗世界，你只是在那个以你为中心的微观宇宙里，孤独且决绝地起舞。", img: "fuyue.jpg", weight: 100 }],

    // --- ESFJ 系列 ---
    "ESFJ-高": [{ name: "天刀笑剑钝", desc: "绝代温玉— HERO — 你是这江湖中最闪耀也最亲和的社交中心，红颜/蓝颜众多却能与你和睦共处，真是羡煞旁人！拥有一掷千金的豪气与侠义心肠的你，天生就有一种让周围人感到幸福的魔力。你不仅是一掷千金、豪情万丈的天刀之首，更是那位能在万花丛中游刃有余、让所有红颜蓝颜都和平共处的'端水大师'。在你眼里，情感的和谐高于一切，你乐于成为众人的依靠，用那种无微不至的关怀和得体的进退，构建起一个充满温情的理想圈子。那种'闪闪发光却不刺眼'的亲和力，让你成为了所有人心中近乎完美的知己。你用最体面的方式行走江湖，用最温柔的侠义守护情谊，你是这场名为人生的盛宴中，最不可或缺、也最动人的首席主角。", img: "tiandao.jpg", weight: 100 }],
    "ESFJ-中": [{ name: "苍越孤鸣", desc: "黄金精神 —NOBLE— 你是这复杂世间最珍贵的一抹‘至诚’。拥有善良内核与强韧毅力的你，即便见识过阴影，依然选择跟从自己的良知与意志。你的真诚有时显得有些笨拙，在习惯了利弊权衡的人眼里，你可能显得不够圆滑，但比谁都更笨拙更真诚的特质使你在这样的逆境下淬炼出强大的能力与生命力。你不屑于用技巧去经营关系，而是用那颗'金子般的心'去换取真心。在你眼里，对他人的关怀与对承诺的坚守，远比眼前的利益更有分量。那种从内而外散发的厚道与温暖，让你在不经意间成为了他人的避风港，也赢得了命运最深沉的厚爱。你用行动证明了：在这个尔虞我诈的世界，极致的善良，才是最无可替代的人格王道。", img: "cangyue.jpg", weight: 100 }],
    "ESFJ-低": [{ name: "千雪孤鸣", desc: "最佳损友-TRUSTEE-你是损友中良心一般的存在，人均病娇世界里最具活人感的生命。你拥有极强的同理心与正义感，习惯于在关键时刻挺身而出，为弱者发声。你从不计较个人得失，那种'舍己为人'的无私精神，让你成为了众人眼中的'活菩萨'。在你眼里，世间的一切苦难都值得被关注与拯救。你用最朴实的方式诠释了何谓'大爱无疆'，这种不求回报的奉献精神，让你在平凡中绽放出不平凡的光芒。", img: "qianxue.jpg", weight: 100 }],

    // --- INFP 系列 ---
    "INFP-高": [{ name: "剑风云", desc: " 主人公— LIGHT— 你是这浊世里最清冽的一道‘剑意’。作为拥有极致成长弧光与共情力的你，你的人生是从向内探索到向外救赎的伟大航程。你曾清冷内敛，游离于喧嚣之外，却在命运的洗礼中，将那份对内在价值的追求，磨砺成了守护众生的磐石。你从不追求权势，却因为那份‘知世俗而不世俗’的通透，成为了所有人眼中不可替代的精神支柱。当最温柔的人握起最坚定的剑，你爆发出的精神力量足以撼动乾坤。你用生命诠释了 INFP 的终极高光：即便世界满目疮痍，你依然能在废墟之上，为了那一寸不染尘埃的理想，燃尽最后一丝灵魂的温度。", img: "jianfeng.jpg", weight: 100 }],
    "INFP-中": [{ name: "殢无伤", desc: "忧郁文青 — POET — 你是这喧嚣江湖里最清冷的‘一首残诗’，沉浸在自己的意象与情感故事中。作为极致敏锐的理想主义者，你拥有一种近乎自虐的审美与情感深度。比起投身乱世，你更倾向于在漫天雪景中与孤独对坐，将过往的碎裂与内心的哀恸，凝结成那柄不带一丝烟火气的墨剑。你那种‘触景生情’的忧郁，并非软弱，而是你对抗平庸世界的唯一方式——用极致的冷，去包裹内心最炽热的伤。在你眼里，世界是破碎的，唯有这份孤独是完整的。这种带点病态美的文青气质，让你在人群中显得如此疏离，却又散发着一种令人心碎的吸引力。你不是在练剑，你是在用每一次挥洒，去祭奠那个从未抵达的梦境。", img: "tiwu.jpg", weight: 100 }],
    "INFP-低": [{ name: "天罗子", desc: "至情小孤岛 —INNOCENT — 你是这复杂江湖里最不愿长大的‘纯真残梦’。往没有那种救世的宏愿，你的世界很小，小到只装得下几个至亲至爱的人。你带着一种近乎任性的天真，用这种看似‘不讲理’的方式去对抗这个充满恶意的世界。在你眼里，众生的大义太过遥远，唯有眼前人的平安与笑容，才是你愿意倾尽所有去守护的真实。你习惯于缩在自我的情感岛屿里，对他人的评价与规则显得疏离甚至有些小小的乖戾。那种‘只为爱而活’的偏执，让你在成熟的社会法则面前显得格格不入，却也让你保留了这一方乱世中，最透明、最动人的一抹赤子之情。", img: "tianluo.jpg", weight: 100 }],

    // --- ESFP 系列 ---
    "ESFP-高": [
        { name: "秦假仙", desc: "游说者— ENTERTAINER — 你是这严肃江湖里最不可或缺的‘变数’与‘乐子’。拥有顶级生存直觉与社交手腕的你，是天生的氛围大师和情报中枢。你从不被死板的教条束缚，‘活得精彩、活得长久’是你最高的人生哲学。在你眼里，没有什么事是一顿插科打诨解决不了的，如果有，那就再来一串烂招。那种‘见缝插针’的精明与关键时刻的仗义，让你在黑白两道之间游刃有余。你用最市侩的嘴脸，行着最长情的侠义。这种把生活当成秀场、把危机当成机遇的乐天派精神，让你成为了武林中唯一永不凋零的传奇——只要你还在蹦跶，这江湖就永远充满了生机与笑声。", img: "qinjia.jpg", weight: 50 },
        { name: "女暴君", desc: "支配者 —DIVA — 你是这冷酷江湖里最明艳也最危险的‘欲望之火’。作为高能量的表演者人格，你拒绝任何平庸与压抑，追求极致的感官盛宴与绝对的权力掌控。你拥有惊人的生命直觉与魅力磁场，习惯于将世界变成你的秀场，让所有人的目光都聚焦在你的裙摆之下。在你眼里，道德与规则不过是点缀华服的装饰，唯有当下的欢愉与征服的快感才是真实的。你那种‘顺我者昌，逆我者亡’的张扬，并非源于深沉的阴谋，而是一种对自我意志不加掩饰的释放。你用最冷酷的手段，包装最炽热的野心，这种把人生当成华丽冒险、永不停歇追逐顶峰的劲头，让你成为了江湖中一抹令人战栗却又无法移开视线的绝代风华。", img: "nvbao.jpg", weight: 50 }
    ],
    "ESFP-中": [{ name: "风逍遥", desc: "独酌者—DRUNK— 你是这紧绷江湖里最松弛的一抹‘微醺’。在你眼里，世界不需要那么多算计，所有的阴霾都能在这一瞬的快意中消散。拥有顶级感官敏锐度与赤子之心的你，是天生的自由主义者。你拒绝被深重的城府与权谋枷锁，‘快刀、烈酒、至交’便是你全部的生命哲学。在你眼里，世界不需要那么多算计，所有的阴霾都能在这一瞬的快意中消散。你那种‘大智若愚’的随性，让你在关键时刻总能爆发出惊人的直觉与生命力。你不追求统治，只求能在风中自由地挥刀，在酒香中坦荡地活着。这种把复杂人生简化为一次呼吸、一场痛饮的豁达，让你成为了乱世中一个永远无法被定义的、最洒脱的风景。", img: "fengxiao.jpg", weight: 100 }],
    "ESFP-低": [{ name: "冰无漪", desc: "浮生享乐家 -ENTERTAINER- 你是这紧绷江湖中最擅长‘放过自己’的聪明人。作为低能量的感官主义者，你拥有一种看透繁华后的惫懒与自洽。你拒绝被任何宏大的责任或沉重的宿命道德绑架，‘当下爽不爽’是你唯一的行事准则。你带着一种玩世不恭的幽默感，用轻佻的外壳隔离了世间的纷扰。在你眼里，拼命追求功名利禄远不如一刻的闲适有趣。你那种‘无鱼虾也好’的随遇而安，让你在尔虞我诈的乱世中，活出了一种令人嫉妒的轻盈。你不是不懂深情，你只是太明白：人生苦短，若不能活得兴致盎然，那赢了天下又有何用？这种自成一派的‘咸鱼美学’，让你成为了江湖中最不可捉摸的一抹清流。", img: "bingwu.jpg", weight: 100 }],

    // --- ISTJ 系列 ---
    "ISTJ-高": [{ name: "梁皇无忌", desc: "人间防火墙— GUARDIAN— 你是这动荡乱世中最坚实、最无懈可击的‘秩序基石’。作为高能量的检查者，你天生拥有一种承载万斤的担当与律己至深的克制。你从不迷信虚妄的奇迹，只信奉绝对的责任与严密的逻辑。在你眼里，守护同门、捍卫正道并非口号，而是需要用每一寸血肉去践行的铁律。你那冷静到近乎肃穆的外表下，藏着一颗对承诺极度忠诚的心，无论局势如何崩坏，只要你还站着，防线就永远不会崩溃。你那种‘虽万人吾往矣’的厚重感，让你成为了所有人心中最可靠的终极底牌。你用一生证明了：真正的强大，不是摧毁一切的暴力，而是那种不动如山、至死不渝的坚守。", img: "lianghuang.jpg", weight: 100 }],
    "ISTJ-中": [{ name: "凛若梅", desc: "霜雪独行者 —PLUM— 你是这浮躁江湖里最寂静也最坚韧的‘守道者’。拥有极强原则性与行动力的你，从不屑于华而不实的辞令，只愿在沉默中践行心中的侠义。你那清冷如霜的外表下，是一颗对传统、责任与情感极其珍重的心，哪怕命运将你置于最荒凉的境地，你也能如寒梅般凌雪盛开。在你眼里，对自我的约束与对信念的坚守，是生存唯一的支点。你不是在追求英雄的光环，你只是在履行那份属于自己的‘道’。这种‘知其不可而为之、守其本分而不移’的孤勇，让你在纷乱的世俗中，活出了一种令人肃然起敬的、大繁至简的高洁之美。", img: "linruo.jpg", weight: 100 }],
    "ISTJ-低": [{ name: "别黄昏", desc: "老实人 — HONEST — 你是这变幻莫测的江湖里，最令人动容的‘老实人’。作为低能量的执行者，你的世界由每一个坚实的记忆和不容动摇的承诺筑成。你生性内敛、不善辞令，总是习惯在沉默中承担起所有的重负。在你眼里，契约与道义高于一切，哪怕为此付出漫长的孤独与等待，也绝不肯在原则上退后半步。这种‘一根筋’的执着，让你在尔虞我诈的乱世中显得有些孤寂甚至笨拙，但正是这份笨拙，赋予了你一种苍凉且神圣的力量。你不是在盲目地活着，你是在用一生的寂寞，去圆一个你认为‘必须如此’的真相。你是那个在黄昏落幕时，依然守在原地、不肯背弃灵魂准则的最孤独的行者。", img: "biehuang.jpg", weight: 100 }],

    // --- ISTP 系列 ---
    "ISTP-高": [
        { name: "藏镜人", desc: "孤狼 — BERSERKER — 你是这伪善江湖中最硬核、最纯粹的独行强者。逆境中的‘锁血狂战士’，越是崩溃边缘，越能绝地重生。作为高能量的反派英雄人格，你信奉极致的实用主义与行动逻辑，从不屑于任何形式的粉饰与妥协。你拥有顶级的战斗直觉与生存本能，在瞬息万变的危局中，你总能以最直接、最狂暴也最有效的手段撕碎障碍。在你眼里，世界只有‘敌’与‘我’、‘行’与‘不行’，那些繁文缛节与虚伪道德在你面前脆弱如纸。你那冷酷狂傲的外壳下，是一份深埋底部的、只留给至亲的赤诚。这种‘天不容我，我亦不容天’的孤傲与霸气，让你成为了所有人心中不可逾越的战神。你用拳头和鲜血书写着属于自己的规则：只要灵魂足够强悍，荒野亦是王座。", img: "cangjing.jpg", weight: 50 },
        { name: "袭灭天来", desc: "DISRUPTOR — 你是这世间最清醒也最危险的‘异类’。你拥有一种近乎冷酷的逻辑洞察力与清晰的布局。你从不迷信阵营与教条，无论是佛之慈悲还是魔之杀戮，都不过是你用来验证自我真理的工具。你拥有顶级的行动力与战术直觉，不屑于虚伪的归属感，只信奉实证与纯粹的力量。在你眼里，世界是一个巨大的实验室，而你既是实验者也是终极的变数。那种‘跳出三界外’的疏离感，让你在执行计划时拥有常人难以企及的果决与效率。你不求被理解，更不屑于被救赎。你用最硬核的方式证明了：真正的自由，是当全世界都在逼你站队时，你依然能踩碎所有的标签，只做自己的神。", img: "ximie.jpg", weight: 50 }
    ],
    "ISTP-中": [{ name: "叶小钗", desc: "无声之刃 — SILENT— 你是这喧嚣江湖中最沉静也最锋利的一抹‘剑影’。你无需回应言语的虚妄，选择用最极致的沉默去承载最深重的道义。你拥有一种近乎本能的战斗天赋，在生死一线间，你的身体远比思维更早做出最精准的决断。在你眼里，行动是唯一的答案，忠诚与承诺不需要宣之于口，而应刻进每一次挥剑的弧光里。那种‘只影孤灯、不诉离殇’的坚毅，让你成为了所有人心中最坚实的后盾。你不用一字一句，却用一生的执守证明了：最高阶的强大，是那种即使被世界放逐、被命运折磨，依然能保持灵魂的绝对独立与清寒的极致之美。", img: "yexiao.jpg", weight: 100 }],
    "ISTP-低": [{ name: "玄同", desc: "剑痴愚者—FOOL—你是这纷扰红尘中唯一能听见‘剑意’的孤独行者。作为极度纯粹的鉴赏家，你对物质世界的感知力（Se）已入化境，却对虚伪的权力博弈冷感至极。你的人生是一场关于‘技艺与道’的终极修行，不为证明给谁看，只为不负心中那抹清冽的锋芒。在你眼里，万物皆有其律，而你只愿与最诚实的剑交谈。那种‘一剑一世界’的专注，让你在喧嚣的王权之争中显得如此疏离而高贵。你那种波澜不惊的冷静，并非由于无情，而是因为你的心早已交付给了更高的艺术。这种不被外物定义的、极致纯粹的生命质感，让你成为了江湖中那个永远无法被招揽、亦无法被磨灭的绝世风骨。", img: "xuantong.jpg", weight: 100 }],

    // --- ESTP 系列 ---
    "ESTP-高": [{ name: "黑白郎君", desc: "末日狂徒 — RISK — 你是这沉闷江湖中最为张狂的一场‘雷暴’。作为高能量的挑战者，你天生就是为竞逐与征服而生的。你拒绝任何形式的平庸与迟疑，‘挑战最强者’是你生命中唯一的信条。你拥有顶级的外向感官，能捕捉到战场上每一个细微的破绽，并以摧枯拉朽之势将其击碎。在你眼里，权谋是懦弱者的游戏，唯有鲜血淋漓的胜负才是最纯粹的真理。那种‘以别人的失败为快乐’的狂傲，并非源于恶意，而是你对生命强度近乎病态的追求。你不屑于被任何阵营束缚，只随心所欲地奔赴下一场更激烈的厮杀。你那种‘敢作敢为、不拘一格’的豪迈，让你成为了所有人心中最具魅力的‘风云人物’。", img: "heibai.jpg", weight: 100 }],
    "ESTP-中": [
        { name: "北狗最光阴", desc: "狩猎者 —  WILD — 你是这沉闷世间最难以捉摸的一场‘旷野疾风’。作为高能量的挑战者，你拥有一种近乎动物本能的敏锐与自由。你拒绝被任何繁文缛节或沉重的宿命枷锁，‘此时、此地、我的兴致’是你唯一的行事逻辑。在你眼里，与其在案牍劳形中算计未来，不如在荒野中来一场酣畅淋漓的狩猎。你拥有顶级的外向感官，能在瞬息万变中捕捉到最真实的节奏。那种戴上狗头面具、隔绝虚伪社交的狂放，并非因为逃避，而是你对纯粹生命力的极致捍卫。当你认准一个目标或一个朋友，你爆发出的执行力与悍不畏死的仗义，足以让时间都为你停驻。你用一生证明了：真正的酷，是看穿了时间的虚妄后，依然能像野兽一样自由、赤诚地活着。", img: "beigou.jpg", weight: 50 },
        { name: "慕容宁", desc: "斯文兵器—ELITE-你是这草莽江湖里最精致毒辣的‘名门’。你早已过了无畏厮杀的阶段，转而追求一种极度自洽的‘格调之美’。你拥有一双看穿世间剑道浮夸的冷眼，更有那份‘一眼断生死’的绝对自信。在你眼里，所谓的名声大义不如一记精准的刺击，所谓的繁文缛节不如一场随心的酒局。你那傲娇、刻薄的言语，不过是你筛选灵魂的漏斗，唯有真正的强者与至亲，才能穿透你那层金灿灿的虚荣，看到你内心最硬核的担当。这种把狂傲融入骨血、用最优雅的姿态行最护短之事的人格张力，让你成为了武林中那个最让人‘又爱又恨’、却又最感可靠的绝代风流。", img: "murong.jpg", weight: 50 }
    ],
    "ESTP-低": [{ name: "锻神锋", desc: "锋芒收藏家 — THE SHOWMAN — 你是这草莽江湖中最讲究‘格调’与‘极致’的异类。作为极致工艺的挑战者，你的人生信条不是厮杀，而是永无止境的‘艳压群芳’。你拥有一双能看穿天下名器瑕疵的毒辣双眼，更有一颗绝不承认平庸的骄傲之心，常常使你陷入“自恋竞争中”。在你眼里，赢不重要，赢得出彩、赢得华丽、赢到对手心服口服才重要。那种‘嘴硬心软’的傲娇，并非源于狭隘，而是你对自身专业领域近乎洁癖般的自负。你不屑于阴谋诡计，只爱用最顶级的作品和最张扬的姿态去硬碰硬。这种把人生当成个人秀场、在极度的自恋与极度的才华之间反复横跳的独特魅力，让你成为了江湖中那个最让人头疼、却也最无法忽视的‘精致战神’。", img: "duanshen.jpg", weight: 100 }],

    // --- ISFJ 系列 ---
    "ISFJ-高": [{ name: "忘今焉", desc: "阴谋者— PLOT — 你是这浊世中最具亲和力的‘操盘手’。作为多重身份的智者，你将细致化作了杀人不见血的锋芒。你深谙传统的礼教与规则，并将其作为操控人心的棋盘。在你眼里，情感是需要被精密计算的变量，而体贴则是最高级的伪装。你拥有一种近乎恐怖的细节洞察力，总是能以‘为了大局’的名义，优雅地剔除每一个异类。那种‘夫子’式的谆谆教诲下，藏着对秩序绝对掌控的野心。你从不轻易暴露出攻击性，却在润物无声中完成了最冷酷的收割。这种将善良工具化、将传统武器化的深沉智计，让你成为了江湖中那个最令人毛骨悚然、也最无法看穿的‘儒雅梦魇’。", img: "wangjin.jpg", weight: 100 }],
    "ISFJ-中": [
        { name: "凤蝶", desc: "副楼主-PRIESTESS-你是这诡谲江湖里最清醒果断、外冷内热的一抹‘异色’。面对那位玩弄人心的‘主上’，你的‘反骨’既是坚守自我的独立，也是对在意之人的纵容，去拆穿虚伪与算计。在你眼里，真正的守护不是低眉顺眼，而是在这疯癫的世界里，替在意的人守住最后一份理性的底线。那种‘言语如刀、行事如织’的特质，是你独特的生存哲学——用最扎人的冷语去隔绝外界的恶意，却把最踏实的安稳留在那方小小的方寸之地。你不需要成为谁的附属，你本身就是那一处即使万劫不复、也依然会亮着灯火的、最坚固的港湾。", img: "fengdie.jpg", weight: 50 },
        { name: "翠萝寒", desc: "才女-WISE-你是这纷乱江湖中最沁人心脾的一抹‘清冽墨香’。你拥有极其细腻的感知力与对完美的偏执，无论是悬丝诊脉的医理，还是九霄惊鸿的剑意，在你手中都化作了救赎与守护的艺术。在你眼里，真正的强大并非征服，而是那份扎根于骨子里的、对同门与世道的责任。你习惯于在温柔中坚持原则，在优雅中守候承诺，纵使江湖易变，你依然是那株在寒风中不改其志的傲雪红梅。那种‘外若春风、内秉秋霜’的坚韧，让你在举手投足间，散发出一种令人心折的、大义与才情并重的绝代风华。你不需要烈火烹油的激进，因为你本身就是那一脉绵延不绝、足以抵御岁月的静水深流。", img: "cuiluo.jpg", weight: 50 }
    ],
    "ISFJ-低": [{ name: "姚金池", desc: "守护者-GUARDIAN-你是这冰冷江湖中最卑微也最温暖的一抹‘炉火’。作为极度内敛的奉献者，你的生命似乎永远在为他人而燃。你习惯了顺从命运的安排，习惯了在那个人看不见的角落，默默打理着所有琐碎的温暖。在你眼里，照顾好一个人的饮食起居、守候一份遥不可及的平安，就是你全部的生命逻辑。你那温柔到近乎卑微的退让，并非因为懦弱，而是因为你的心太小，小到只能装下那一个人的喜怒哀乐。那种‘虽无名分、亦无怨尤’的陪伴，是你对情感最纯粹、也最令人心碎的解读。你不需要站在光芒下，因为你甘愿做那个在寒夜里，为晚归人留下一盏孤灯的、最静默的守望者。", img: "yaojin.jpg", weight: 100 }],

    // --- ENFP 系列 ---

    "ENFP-低": [{ name: "飞渊", desc: "喜剧人—DREAMER — 你是个脑补力超群的梦幻喜剧人，周围发生的一切在你眼里都自动加上你的‘后期特效’。因此，你时常活在自己的脑内小剧场中，而没意识到这些有可能是你神奇的大脑加工过的信息！但是别担心，善良活泼的你往往有好人缘，在身边的许多朋友的帮助和善意提醒下，你也能正常生活！拥有顶级发散性思维的你，被动技能是随时随地开启脑内小剧场——哪怕只是路人的一次擦肩，你都能在心里为他们脑补出一场旷世绝恋。你活在一个充满粉红泡泡和英雄主义的平行世界里，表情永远比剧情更精彩。虽然你常常因为‘想太多’而陷入自我感动的尴尬，但那种纯粹的赤子之心和救人于水火的热情，让你成为了身边人最暖心的（也是最头疼的）开心果。对你而言，现实世界只是素材，你那永不枯竭的脑洞，才是你对抗平庸、拥抱自由的最强武器。", img: "feiyuan.jpg", weight: 100 }],

    function renderQuestion() {
        const data = questions[currentStep];
        if(!data) return;

        document.getElementById('q-text').innerText = data.q;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';

        data.opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                // 维度拆解
                if (opt.v && opt.v > 0) {
                    let val = opt.v;
                    if (val >= 20000000) counts.E++; else if (val >= 10000000) counts.I++;
                    val %= 10000000;
                    if (val >= 200000) counts.N++; else if (val >= 100000) counts.S++;
                    val %= 100000;
                    if (val >= 2000) counts.T++; else if (val >= 1000) counts.F++;
                    val %= 1000;
                    if (val >= 20) counts.P++; else if (val >= 10) counts.J++;
                }

                if (opt.e !== undefined) energyScore += opt.e;
                if (opt.specialLogic === "Q19_B") isSpecial_DaoWuJi = true;

                if (opt.isEnd) {
                    showFinalResult();
                } else if (opt.next !== undefined) {
                    currentStep = opt.next;
                    renderQuestion();
                } else {
                    currentStep++;
                    renderQuestion();
                }
            };
            container.appendChild(btn);
        });
    }

    function getMBTIType() {
        let res = "";
        res += counts.E >= counts.I ? "E" : "I";
        res += counts.N >= counts.S ? "N" : "S";
        res += counts.T >= counts.F ? "T" : "F";
        res += counts.P >= counts.J ? "P" : "J";
        return res;
    }

    function showFinalResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';

        let mbti = getMBTIType();
        let finalChar = null;

        // 特殊角色拦截
        if (isSpecial_DaoWuJi) {
            finalChar = characterDB["HIDDEN-DAOWUJI"][0];
        } else if (mbti === "INTJ" && energyScore <= 2) {
            finalChar = characterDB["HIDDEN-FUYING"][0];
        } else {
            let level = energyScore >= 5 ? "高" : (energyScore <= 2 ? "低" : "中");
            let key = `${mbti}-${level}`;
            let candidates = characterDB[key] || characterDB[`${mbti}-中`]; 

            if (candidates) {
                let totalWeight = candidates.reduce((sum, c) => sum + (c.weight || 100), 0);
                let random = Math.random() * totalWeight;
                let currentSum = 0;
                for (let c of candidates) {
                    currentSum += (c.weight || 100);
                    if (random <= currentSum) { finalChar = c; break; }
                }
            }
        }

        // --- 核心渲染：处理抬头、副标题中文/英文 ---
      if (finalChar) {
            document.getElementById('char-name').innerText = finalChar.name;
            document.getElementById('char-img').src = "image/"+finalChar.img;

            // 修正：兼容性拆分逻辑
            // 无论你用的是 - 还是 —，都统一处理
            let rawDesc = finalChar.desc.replace(/-/g, '—'); 
            let parts = rawDesc.split('—'); 

            if (parts.length >= 3) {
                // 标准格式：中文标题—英文标题—内容
                document.getElementById('sub-cn').innerText = parts[0].trim();
                document.getElementById('sub-en').innerText = parts[1].trim();
                document.getElementById('char-desc').innerText = parts.slice(2).join('—').trim();
            } else if (parts.length === 2) {
                // 只有两段的情况：标题—内容
                document.getElementById('sub-cn').innerText = parts[0].trim();
                document.getElementById('sub-en').innerText = ""; // 英文留空
                document.getElementById('char-desc').innerText = parts[1].trim();
            } else {
                // 完全没分割符的情况
                document.getElementById('sub-cn').innerText = "";
                document.getElementById('sub-en').innerText = "";
                document.getElementById('char-desc').innerText = finalChar.desc;
            }
        }
    }

    window.onload = function() {
        renderQuestion();
    };
</script>
