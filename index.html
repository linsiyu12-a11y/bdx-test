<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布袋戏江湖命数测试</title>
    <style>
        :root {
            --bg-color: #f4f1ea; /* 宣纸色 */
            --text-color: #2c2c2c;
            --accent-color: #8b0000; /* 宫墙红 */
            --border-color: #d3cbb8;
        }
        body {
            font-family: "Microsoft YaHei", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        #game-box {
            width: 90%; max-width: 600px; padding: 40px; background: #fff;
            border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--accent-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        .q-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 30px; min-height: 60px; }
        .opt-btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 15px;
            background: none; border: 1px solid var(--border-color); cursor: pointer;
            transition: 0.3s; font-size: 1rem; text-align: left;
        }
        .opt-btn:hover { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        #result-area { display: none; text-align: center; }
        .char-img { width: 100%; max-width: 320px; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin: 20px 0; }
        .hidden-tag { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="quiz-area">
        <h1 id="title">江湖命数测试</h1>
        <div class="q-text" id="q-text">正在开启江湖大门...</div>
        <div id="opt-container"></div>
    </div>

    <div id="result-area">
        <div id="hidden-box"></div>
        <h2 id="char-name" style="font-size: 2rem; color: var(--accent-color); margin: 10px 0;"></h2>
        <p id="mbti-res" style="color: #666; letter-spacing: 2px;"></p>
        <img id="char-img" class="char-img" src="" alt="角色立绘">
        <p id="char-desc" style="text-align: left; line-height: 1.8; color: #444; padding: 0 20px;"></p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 25px; cursor:pointer;">重入轮回</button>
    </div>
</div>

<script>
    // --- 你的核心算法配置 ---
    const WEIGHTS = { E: 20000000, I: 10000000, N: 200000, S: 100000, T: 2000, F: 1000, P: 20, J: 10 };
    
    // 题目数据 (建议你后续根据截图补齐 6-15 题)
    const questions = [
        { q: "1. 你的新手村所在地是？", opts: [
            { t: "云顶之境 (I+N)", v: {I:1, N:1} }, { t: "学院 (E+N)", v: {E:1, N:1} },
            { t: "荒郊野外 (I+S)", v: {I:1, S:1} }, { t: "尘嚣闹市 (E+S)", v: {E:1, S:1} }
        ]},
        // ... (此处为了演示，你可以按此格式补齐所有 21 题)
    ];

    let step = 0;
    let score = 0;
    let energy = 0;

    function render() {
        if(step >= questions.length) { showResult(); return; }
        const data = questions[step];
        document.getElementById('q-text').innerText = data.q;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        data.opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = o.t;
            b.onclick = () => {
                if(o.v) Object.keys(o.v).forEach(k => score += WEIGHTS[k]);
                if(o.e) energy += o.e;
                step++; render();
            };
            container.appendChild(b);
        });
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        const res = document.getElementById('result-area');
        res.style.display = 'block';

        // 简易位权判定逻辑 (你需要根据最终题目数量调整判定阈值)
        let m = (score / 10000000 >= 1.5) ? "E" : "I";
        // ... 继续计算 N/S, T/F, P/J ...
        
        document.getElementById('char-name').innerText = "六弦之首·苍";
        document.getElementById('mbti-res').innerText = "INTP · 高能量";
        document.getElementById('char-img').src = "这里放你的图片链接"; // 记得把图片上传到仓库或用图床
        document.getElementById('char-desc').innerText = "倚筝天波浩渺，尽看云海波涛。";
    }

    render();
</script>
</body>
</html>
